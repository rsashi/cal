name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            zip \
            unzip \
            git
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-*
          key: ${{ runner.os }}-android-sdk-ndk-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-ndk-

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Calculator
          package.name = calculator
          package.domain = com.example
          source.dir = .
          source.include_exts = py
          version = 1.0
          requirements = python3,kivy==2.3.0
          orientation = portrait
          fullscreen = 0
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.archs = arm64-v8a
          [buildozer]
          log_level = 2
          EOF

      - name: Build APK
        run: buildozer android debug
        timeout-minutes: 90
        continue-on-error: true

      - name: Check build output
        run: |
          echo "=== Checking for APK ==="
          ls -la bin/ || echo "No bin directory found"
          echo "=== Checking buildozer logs ==="
          find .buildozer -type f -name "*.log" | head -5 | xargs tail -50 2>/dev/null || echo "No logs found"

      - name: Upload APK
        if: hashFiles('bin/*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: bin/*.apk
