name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            zip \
            unzip \
            git
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-*
          key: ${{ runner.os }}-android-sdk-ndk-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-ndk-

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Calculator
          package.name = calculator
          package.domain = com.example
          source.dir = .
          source.include_exts = py
          version = 1.0
          requirements = python3,kivy==2.3.0
          orientation = portrait
          fullscreen = 0
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.archs = arm64-v8a
          [buildozer]
          log_level = 2
          warn_on_root = 1
          EOF

      - name: Build APK (accept licenses)
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf '8933bad161af4d5d886bfdf7f3effd58abc7f1ed' > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf '84831b9409646a918e30573bab4c9c91346d8abd' > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          printf 'd56f5187479451eabf01fb78af6dfcb131b33910' > ~/.buildozer/android/platform/android-sdk/licenses/google-gdk-license
          yes | buildozer android debug 2>&1 | tail -100
        timeout-minutes: 120

      - name: Upload APK
        if: hashFiles('bin/*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: bin/*.apk
